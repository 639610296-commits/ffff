<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Microsoft YaHei",sans-serif;
}

body{
background:linear-gradient(180deg,#edf5ff,#dcecff,#edf5ff);
color:#333;
overflow-x:hidden;
}

/* header */
.header{
width:95%;
margin:15px auto;
padding:15px;
background:rgba(255,255,255,.55);
backdrop-filter:blur(20px);
border-radius:22px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 8px 25px rgba(0,119,255,.15);
}

.logo{
display:flex;
align-items:center;
gap:15px;
}

.logo-icon{
width:58px;
height:58px;
border-radius:50%;
background:#fff;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
color:#1e7bff;
box-shadow:0 5px 15px rgba(0,119,255,.2);
}

.menu{
width:55px;
height:55px;
border-radius:50%;
background:#fff;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
}

/* banner */
.banner{
width:95%;
margin:auto;
height:240px;
border-radius:25px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,119,255,.15);
}

.banner img{
width:100%;
height:100%;
object-fit:cover;
}

/* 公告 */
.notice{
width:95%;
margin:12px auto;
padding:14px;
background:#fff;
border-radius:18px;
box-shadow:0 6px 20px rgba(0,0,0,.08);
font-size:14px;
line-height:1.6;
}

.notice .hot{
margin-top:8px;
color:#d60000;
font-weight:bold;
}

/* 工具 */
.tools{
width:95%;
margin:auto;
display:flex;
justify-content:space-around;
background:rgba(255,255,255,.55);
padding:20px;
border-radius:25px;
box-shadow:0 8px 20px rgba(0,119,255,.15);
}

.tool{
text-align:center;
font-size:14px;
}

/* 标题 */
.title{
text-align:center;
font-size:34px;
font-weight:bold;
color:#1d7bff;
margin:30px 0 15px;
}

.line{
width:100px;
height:5px;
background:#1d7bff;
margin:auto;
border-radius:10px;
}

/* cards */
.cards{
width:95%;
margin:auto;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding-bottom:20px;
}

.card{
display:block;
text-decoration:none;
background:rgba(255,255,255,.65);
border-radius:20px;
padding:15px;
text-align:center;
box-shadow:0 8px 20px rgba(0,119,255,.15);
color:#333;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:14px;
margin-bottom:10px;
}

.card div{
font-size:16px;
font-weight:bold;
color:#1976ff;
}

.footer{
margin:30px 0;
text-align:center;
color:#888;
font-size:14px;
}

a{
text-decoration:none;
color:inherit;
}
</style>
</head>
